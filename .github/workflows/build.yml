name: Build

on:
  push:
    branches: ["main"]
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build

      - name: Upload mod jar
        uses: actions/upload-artifact@v4
        with:
          name: aura-jars
          path: |
            build/libs/*.jar
            !build/libs/*-sources.jar
            !build/libs/*-dev.jar

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download mod jar
        uses: actions/download-artifact@v4
        with:
          name: aura-jars
          path: release-artifacts

      - name: Find mod jar
        id: mod_jar
        run: |
          MOD_JAR="$(find release-artifacts -type f -name '*.jar' | sort | head -n 1)"
          if [ -z "$MOD_JAR" ]; then
            echo "No mod jar found in release-artifacts" >&2
            exit 1
          fi
          echo "path=$MOD_JAR" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" "${{ steps.mod_jar.outputs.path }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --latest
